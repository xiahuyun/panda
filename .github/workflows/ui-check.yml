name: UI Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ui-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run UI check
        working-directory: panda-mobile
        run: npm run ui:check
